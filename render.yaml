services:
  - type: web
    name: tropical-battery-sales-agent
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      # --- pre-filled (safe, non-secret) ---
      - key: ELEVENLABS_VOICE_ID
        value: yuS5yvxd9cdXv5KzBa74
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: LEADS_SUPABASE_URL
        value: https://ztgerulyxaltuhsodrne.supabase.co
      - key: INVENTORY_SUPABASE_URL
        value: https://qunnxsxeevoeflqfrzwz.supabase.co
      - key: FORCE_AGENT_ACTIVE
        value: "true"     # answer at any hour while testing; set false for production
      # --- set these in the Render dashboard (secrets) ---
      - key: PUBLIC_WSS_URL          # wss://<this-service>.onrender.com/ws/voice  (set after first deploy)
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: LEADS_SUPABASE_SERVICE_KEY
        sync: false
      - key: INVENTORY_SUPABASE_KEY
        sync: false
